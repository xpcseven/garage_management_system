name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    env:
      NEXT_WEBSITE_URL: ${{ secrets.NEXT_WEBSITE_URL }}

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # بعد كل build يجب إعادة تشغيل Next حتى تتطابق ملفات _next/static مع الـ HTML
      - name: Restart application
        run: |
          if command -v pm2 >/dev/null 2>&1; then
            pm2 restart all || pm2 restart new-system || pm2 restart garage_management_system || true
          fi
          if command -v systemctl >/dev/null 2>&1; then
            sudo systemctl restart nextjs || sudo systemctl restart garage || true
          fi
